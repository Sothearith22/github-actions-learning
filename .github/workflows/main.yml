name: Environment Variables Demo

on:
  push:
    branches:
      - main

jobs:
  env-demo:
    runs-on: ubuntu-latest

    env:
      APP_NAME: CI_CD_LEARNING

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: node index.js