name: Multi Job Pipline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    step:
      - name: Test Step
      run: echo "Running Tests..."
  
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Build Step
        run: echo "Building Application..."

  deploy:
    needs: build
    runs-om: ubuntu latest

    step:
      - name: Deploy Step
        run: echo "Deploying Application"

