name: Upload and Download Artifact

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: echo "Hello CI/CD" > hello.txt

      - uses: actions/upload-artifact@v4
        with:
          name: my-file
          path: hello.txt

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: my-file

      - run: cat hello.txt